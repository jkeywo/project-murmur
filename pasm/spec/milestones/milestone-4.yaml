# Milestone 4 — The Job Is Not Always A Kill
#
# Shipped after the protected-target work of milestone 3. The goal was
# contract variety at venue scale: give the board more than one verb and
# make the route planner prove objective completion rather than a kill.
#
# The roadmap gates its own next layer on this: future-city-map-layers is
# "deferred until venue-scale contract variety is proven", and
# future-solo-heists describes reusing infiltration, security, planning,
# opportunity and extraction under a different objective. That variety is
# now proven — and the headline finding is that it took no change to the
# planner's capability closure to prove five different objectives.

entities:
  - system: milestone-4-objective-variety
    core:
      status: implemented
      confidence: confirmed
      title: Milestone 4 — The Job Is Not Always A Kill
      summary: >-
        Five venues, three topologies, protected targets, opportunity
        machines, five constraints, an economy and a heat ledger used to
        point at one sentence: kill this person. The board now carries five
        job types — assassinate, steal, sabotage, extract a captive alive,
        plant an item — each an explicit Objective the route planner proves
        completable, priced differently, with constraints reading the same
        against a theft as a kill. The generalisation held: the monotone
        capability closure did not change to prove any of the four new
        objectives, which is exactly the vindication the milestone existed
        to get before the project commits to a city.
      references:
        - milestone-4-playability-pass
        - milestone-4-objective-model
        - milestone-4-planner-generalisation
        - milestone-4-objectives-as-data
        - milestone-4-mixed-contract-board
        - future-solo-heists
    implementation:
      status: declared
      paths: [crates/murmur-core/src/world.rs, crates/murmur-core/src/planner.rs, crates/murmur-core/src/generator/objective.rs, crates/murmur-campaign/src/lib.rs]
      tests: [crates/murmur-core/tests/objectives.rs, crates/murmur-core/tests/verbs.rs]

  - component: milestone-4-playability-pass
    core:
      status: implemented
      confidence: confirmed
      title: Slice Zero — Is The Core Loop Good Yet
      summary: >-
        Before piling objectives on the loop, loss attribution measured
        where the difficulty sat after the onion venues and the body-fall
        thump: roughly three-eighths of missions ended target-dead but the
        player caught or killed on the exit, half of those arrests after a
        silent kill. The owner's ruling was a getaway grace — completing the
        objective opens a short window in which a found body draws an
        investigator rather than the alarm and a glimpse of the leaving
        player accrues half suspicion, but witnessed violence is unaffected.
        Corpus rose 528 to 618 permille; arrests fell 156 to 59. The second
        parked decision — a cheated run still pays out — needed no code, the
        cheats never touched the economy.
      references: [milestone-3-acceptance, the-getaway-grace-rewards-a-planned-exit, cheated-runs-still-pay-out]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/world.rs, crates/murmur-core/src/perception.rs, crates/murmur-core/src/turn.rs, data/tuning.ron]
      tests: [crates/murmur-core/tests/gameplay.rs]

  - component: milestone-4-objective-model
    core:
      status: implemented
      confidence: confirmed
      title: An Objective, Where The Target Used To Be Implicit
      summary: >-
        The mission's goal became a named Objective rather than an
        assumption spread across the codebase. Extraction was gated on the
        target being dead; the target-escaped loss was assassination-
        specific; MissionFacts named a target; the shell read the same. All
        of that now reads is_complete / subject_lost / focus_actor on the
        objective. A behaviour-preserving refactor — with only assassination
        present, every mission played byte-for-byte the same and the golden
        behaviour columns were identical across all twenty rows.
      references: [milestone-4-planner-generalisation]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/world.rs, crates/murmur-core/src/generator/mod.rs, crates/murmur-core/src/actions/mod.rs, crates/murmur-shell/src/render.rs]
      symbols: [Objective]
      tests: [crates/murmur-core/src/turn.rs]

  - component: milestone-4-planner-generalisation
    core:
      status: implemented
      confidence: confirmed
      title: The Planner Proves Objectives, Not Kills
      summary: >-
        The load-bearing slice, and the one the milestone existed to test.
        prove_route no longer knows the goal is a kill: it computes the
        capability closure, calls prove_completion which dispatches on the
        Objective, then proves extraction from the same closure. The
        headline result — the monotone capability closure did not need to
        change, for assassination or for any of the four objectives that
        followed. Each completion is expressed as reaching a qualifying
        position with the required capability, which the closure's reachable
        set already answers. A pure refactor with only assassination
        present: golden stayed green and byte-identical.
      references: [monotone-capability-closure-planner, objective-completion-is-reach-a-position-with-a-capability]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/planner.rs, crates/murmur-core/src/generator/proof.rs]
      symbols: [prove_completion]
      tests: [crates/murmur-core/tests/objectives.rs]

  - component: milestone-4-objectives-as-data
    core:
      status: implemented
      confidence: confirmed
      title: Four More Objectives — Two As Data, Two As New Verbs
      summary: >-
        Steal an item, sabotage a machine, extract a person alive, plant an
        item. Steal and sabotage landed as pure data over the model, reusing
        pickpocket and machine interaction — the generality the milestone
        wanted. Extract-alive and plant had no verb to map onto, only
        looting one off an actor, so per the owner's call two verbs were
        added rather than reframing: Lead, an orthogonal follow assignment
        mirroring the bodyguard detail so a scare suspends the leash rather
        than dropping it, and Plant, a reverse pickpocket. The split — two
        objectives configured, two verbs added — is reported as the finding,
        not smoothed over. The default objective stays assassination, so the
        golden and corpus paths were untouched; the four are proved by
        scripted end-to-end wins.
      references: [milestone-4-objective-model, two-new-verbs-over-reframing-the-tricky-objectives]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/world.rs, crates/murmur-core/src/generator/objective.rs, crates/murmur-core/src/actions/lead.rs, crates/murmur-core/src/actions/theft.rs, crates/murmur-core/src/ai.rs, data/items.ron]
      symbols: [ObjectiveKind]
      tests: [crates/murmur-core/tests/objectives.rs, crates/murmur-core/tests/verbs.rs]

  - component: milestone-4-mixed-contract-board
    core:
      status: implemented
      confidence: confirmed
      title: A Board Worth Reading
      summary: >-
        Board offers now roll a job type and price it from a tunable table
        (rescue pays most for the escort risk, plant least for the low
        exposure), so choosing a contract is a decision about what to do,
        not only which condition to accept. Constraints proved orthogonal
        where it counts: no-firearms, no-collateral, no-bodies-found and
        specific-exit read the same against a theft as a killing and were
        left unchanged — a real check that the constraint model was built at
        the right altitude. Only private-kill is genuinely kill-specific, so
        rather than water it down the board refuses to pair it with a
        non-kill job. Old saves load unchanged; the hub row leads with the
        job verb.
      references: [milestone-4-objective-model, constraint-catalogue-and-breach-semantics]
    implementation:
      status: declared
      paths: [crates/murmur-campaign/src/lib.rs, crates/murmur-core/src/data.rs, data/campaign.ron, crates/murmur-shell/src/screens.rs]
      symbols: [ObjectivePayoutFactors]
      tests: [crates/murmur-campaign/src/lib.rs]
