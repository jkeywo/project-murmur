  - decision: keymap-is-one-table
    core:
      status: implemented
      confidence: confirmed
      title: Key Bindings Live in One Table
      summary: The fifteen mission key literals were written out in four places that could drift apart - the clickable palette in render, the dispatch match in mission, the availability probe action_block, and the start screen's key list. They now come from one table, murmur-shell keymap, whose entries carry the key, a short palette label, a one-line description, and a category. The palette, the start screen, the in-mission help overlay, and the inventory-slot inspection line all render from it. Availability deliberately stays out of the table and remains in action_block, because it depends on live world state; the two are keyed by the same char. A test presses every table key from a clean normal-mode state and asserts something observable happened, which is what actually holds the table and the dispatch match together.
      rationale:
        - Four hand-maintained copies of the same list is a drift bug waiting to happen, and the start screen's copy had no test at all.
        - Describing an item by the key it enables rather than by flavour text falls out of the table for free, and follows any future rebinding.
