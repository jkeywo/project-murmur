  - decision: escort-is-an-assignment-not-a-mood
    core:
      status: implemented
      confidence: confirmed
      title: A Bodyguard Detail Is An Assignment, Not A Mood
      summary: Bodyguards carry an AiState.detail independent of their mood, dispatched ahead of the mood match so that escorting replaces only the relaxed behaviour. Mood::Escorting looked free but is semantically taken - it means escorting the arrested player off the premises, renders hostile, and every de-escalation path in perception and AI returns an NPC to Mood::Relaxed and nothing else. An escort expressed as a mood would be destroyed by the first noise a guard investigated, and details would quietly dissolve mid-mission with nothing to say so. Adjacency denial then costs no code at all - guards are already not displaceable, so a detail in formation denies the player exactly the tiles a garrote needs.
      rationale:
        - Perception keeps full authority over mood, which is what lets a guard investigate a sound and resume escorting for free.
        - Formation slots are handed out by ascending actor id and read from a fixed table rather than chosen by proximity, because nearest-free-side depends on iteration order and would drift replays.
        - A slot is a preference rather than an entitlement. In a corridor the north and south slots are walls, and a guard pathing at a wall never arrives and never gives up, so slots are tried from the guard's own index onwards and wrap.
      references: [protection-not-reachability-is-the-difficulty]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/world.rs, crates/murmur-core/src/ai.rs, crates/murmur-core/src/generator/populate.rs, data/tuning.ron]
      symbols: [DetailRole]
      tests: [crates/murmur-core/tests/escort.rs]

  - decision: bodies-stop-bullets-but-not-sight
    core:
      status: implemented
      confidence: confirmed
      title: A Body Stops A Bullet, But Never A Line Of Sight
      summary: The first standing actor on a bullet's path takes the round, walked outwards from the shooter along the existing supercover ray. Actors deliberately still do not block line of sight - sight_blocker consults terrain and furniture only, and it is symmetric, so making actors opaque would silently rewrite suspicion accumulation and alert propagation against every tuned number in tuning.ron. Interposition is the local, general alternative, and it is what makes a bodyguard detail worth walking around rather than shooting through, since firing into it costs a round, a gunshot incident, a witnessed death and leaves the principal alive.
      rationale:
        - Confining the change to shoot resolution means no perception number needed retuning, which is the whole reason to prefer it over opaque actors.
        - It quietly strengthens NoCivilianCasualties without that constraint needing to know anything about escorts.
      references: [escort-is-an-assignment-not-a-mood]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/actions.rs, data/loc/strings.csv]
      tests: [crates/murmur-core/tests/escort.rs]

  - decision: the-private-window-has-a-clock
    core:
      status: implemented
      confidence: confirmed
      title: The Private Window Has A Clock, And The Detail Carries The Keys
      summary: A detail holding station outside a no-follow beat counts turns and eventually goes in to look. The clock measures how long the principal has been out of sight rather than how long a particular guard has had its feet on a particular tile, because a guard that cannot reach its post - crowded out, or queueing at a door - would otherwise wait forever and the window would never close. Bodyguards also carry copies of whatever keys their principal's day needs, since a detail that cannot follow its principal through a locked door is not a detail at all, and without the keys the search clock expired with nobody able to act on it. Those keys sit on someone the player can follow and pickpocket, which is the intended way in.
      rationale:
        - Difficulty should reward acting rather than waiting. An unlimited private window makes patience strictly optimal, which is the failure mode a longer mission most needs to avoid.
        - Posts are distinct per slot. One shared post means only one guard can stand it and the rest mill about pathing at an occupied tile.
      references: [escort-is-an-assignment-not-a-mood, protection-not-reachability-is-the-difficulty]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/ai.rs, crates/murmur-core/src/generator/populate.rs, data/tuning.ron]
      tests: [crates/murmur-core/tests/escort.rs]

  - decision: a-guarded-principal-is-evacuated-inward
    core:
      status: implemented
      confidence: confirmed
      title: A Guarded Principal Is Evacuated Inward, Not Out The Door
      summary: A principal with at least one bodyguard still on its feet does not run for the street like a civilian - the detail walks it into the deepest reachable tier instead. This makes the fire alarm deliberately double-edged - it empties the crowd, which helps the player, and it hardens the target, which does not. The existing rule that a target reaching the street ends the mission is preserved rather than replaced, and a principal whose detail is dead, or with nowhere defensible to reach, flees like anyone else.
      rationale:
        - Evacuation is the behaviour that makes panicking the target a real decision instead of a free win or an instant loss.
        - Keeping the escape-is-game-over rule intact matters because it was explicit playtest feedback; evacuation narrows when it fires rather than removing it.
      references: [escort-is-an-assignment-not-a-mood]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/ai.rs]
      tests: [crates/murmur-core/tests/escort.rs]

  - decision: the-player-can-open-the-window
    core:
      status: implemented
      confidence: confirmed
      title: The Player Can Open The Private Window, Not Only Wait For It
      summary: A paging desk summons the target to a named beat, jumping the schedule forward and remembering where the day was so the cycle resumes rather than restarts. Because the summoned beat is an alone beat with no_follow set, the detail peels off to its posts through the escort rules already written - the summon contains no escort code whatsoever. This is the lever that makes a longer mission better rather than merely longer, because without it the answer to an unattackable target is to stand still until the schedule comes round, and patience becomes the optimal strategy. The desk is placed only when the target's schedule actually carries the tag it names, since a lever wired to nothing is worse than no lever. AccidentDrop placement now prefers escorted beats, which makes the asymmetry structural - the accident wants to sit where the detail is, not where a garrote would have worked anyway.
      rationale:
        - Remembering resume_index preserves the cyclic invariant the atemporal planner depends on. Restarting the cycle would silently drop the beats between where the day was and where it jumped to.
        - The summon reuses no_follow rather than commanding the guards, which is the test of whether the escort rules were general.
      references: [protection-not-reachability-is-the-difficulty, escort-is-an-assignment-not-a-mood]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/data.rs, crates/murmur-core/src/actions.rs, crates/murmur-core/src/generator/opportunities.rs, data/opportunities.ron]
      tests: [crates/murmur-core/tests/escort.rs]

  - decision: opportunity-coverage-not-opportunity-count
    core:
      status: implemented
      confidence: confirmed
      title: Validate Opportunity Coverage, Not The Number Of Machines
      summary: Cross-validation asserted exactly five opportunity machines with an exact approach breakdown. That was true while five were authored and it stopped being a property the moment a sixth was wanted - adding the paging desk failed six campaign tests for no reason connected to what the check was protecting. The rule now asserts that every approach has at least one machine, so no route class is left without a lever, and says nothing about the total.
      rationale:
        - Pinning a count in a milestone-scoped check turns the next authored machine into a spurious failure, which trains the reader to edit the assertion rather than to think about it.
      references: [the-player-can-open-the-window]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/data.rs]

  - decision: the-schedule-must-actually-advance
    core:
      status: implemented
      confidence: confirmed
      title: The Beat Index Advances At Runtime, And A Principal Walks Through Its Own Detail
      summary: Three defects made every protection rule inert in actual play, none of them visible from any single test. The beat index was never advanced by the AI, so schedule.current() sat on beat zero forever and the target read as permanently escorted - the escort tests passed only because they set the index by hand. The detail encircled its principal and guards are not displaceable, so the target was caged by its own bodyguards and stopped walking its schedule entirely. And the target's first beat could be the entrance hall, which put it next to the player's spawn with the mission over before any of this mattered. Beats now advance in step with the routine they mirror, a bodyguard gives way to the person it guards, and the day starts at the escorted beat furthest from any exit.
      rationale:
        - Each of these was invisible to unit tests and only showed up when a full mission was played end to end, which is the argument for keeping a scripted playthrough as a first-class test rather than a smoke check.
        - Displacement is granted specifically to the principal rather than generally to guards, so the ring still denies the player every tile it denied before.
      references: [escort-is-an-assignment-not-a-mood, beats-mirror-the-routine-index-for-index]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/ai.rs, crates/murmur-core/src/world.rs, crates/murmur-core/src/actions.rs, crates/murmur-core/src/generator/schedule.rs, crates/murmur-core/src/generator/populate.rs]
      symbols: [is_displaceable_by]
      tests: [crates/murmur-core/tests/escort.rs, crates/murmur-core/tests/playthrough.rs]

  - decision: a-detail-covers-its-principal
    core:
      status: implemented
      confidence: confirmed
      title: A Detail Covers Its Principal, Not Just The Tiles It Stands On
      summary: A bodyguard standing beside its principal takes a shot aimed at them, nearest to the shooter first with ties broken by ascending actor id. Requiring a guard to be exactly on the supercover ray was far too narrow for what a bodyguard is for - with three guards on four sides most firing angles have a clean line, and an escorted target could simply be shot from across the room. Measured end to end, that left the escorted and alone distinction with no teeth whatsoever in play however carefully the route planner reasoned about it.
      rationale:
        - The stated design inversion is that an escorted target is attackable only by accident. A rule that makes escorting merely inconvenient does not deliver it.
        - Firing into a detail still resolves - it costs a round, a gunshot, a witnessed death and a live principal - so the player is refused a shortcut rather than an action.
      references: [bodies-stop-bullets-but-not-sight]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/actions.rs]
      tests: [crates/murmur-core/tests/escort.rs, crates/murmur-core/tests/playthrough.rs]

  - decision: five-defects-only-a-playthrough-could-see
    core:
      status: implemented
      confidence: confirmed
      title: Five Engine Defects Only A Full Playthrough Could See
      summary: Rewriting the scripted assassin to play the intended loop surfaced five engine defects, none visible to a unit test because each needed many actors, many turns, and real geometry at once. Stair tiles sat inline in spine corridors and per-turn re-planning teleport-oscillated NPCs between storeys, fixed twice over - pathfinding now prices a stair transition at several plain steps so up-and-straight-back-down is never shortest, and stairwell anchors fill the spine's dead-end tip column-major so no route ever walks through a stair tile. Pathfinding refused locked doors that were standing open, stranding anyone without the key on the wrong side of a doorway the target itself had just walked through. NPCs bumped a parked player forever because pathing ignored actors and the player alone is never displaced, so NPCs now route around the player's tile except when it is the goal. And the escort ring contested its own principal's next tile every turn, halving the target's pace through its own day - a walking principal's detail now trails in column and rings it only when it stands.
      rationale:
        - Every fix is engine-level and benefits the human player identically - click-to-move used the same pathfinder that refused open doors.
        - The scripted playthrough stays a first-class test precisely because this class of defect reappears whenever systems compose, and nothing smaller catches it.
      references: [the-schedule-must-actually-advance, escort-is-an-assignment-not-a-mood]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/path.rs, crates/murmur-core/src/generator/district.rs, crates/murmur-core/src/ai.rs]
      tests: [crates/murmur-core/tests/playthrough.rs, crates/murmur-core/tests/escort.rs]

  - decision: fast-forward-is-pure-presentation
    core:
      status: implemented
      confidence: confirmed
      title: Fast-Forward Presses The Wait Key, Nothing More
      summary: The shell's hold-to-wait submits ordinary Wait commands through the ordinary driver until something worth reacting to happens - a log message, damage, the mission ending, or the target's protection changing, which is the window opening. The commands land in accepted_commands like any other, so replay and determinism are untouched; fast-forward is purely presentation deciding how fast to press a key the player already had. Any deliberate input cancels it. The sidebar gained a target-intel line showing the current beat's protection, treated as briefing-grade knowledge from the handler rather than something deduced from pixels, because the whole milestone turns on when that state flips and hiding it would make waiting a guessing game.
      rationale:
        - Longer missions without a way to skip dead time are strictly worse missions; the plan called this lever mandatory alongside the paging desk.
        - Stopping on protection change makes the intel line and the fast-forward two views of the same fact.
      references: [the-player-can-open-the-window, protection-not-reachability-is-the-difficulty]
    implementation:
      status: declared
      paths: [crates/murmur-shell/src/mission.rs, crates/murmur-shell/src/render.rs, crates/murmur-shell/src/keymap.rs, data/loc/strings.csv]
