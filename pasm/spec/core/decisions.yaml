entities:
  - decision: rust-workspace-decomposition
    core:
      status: accepted
      confidence: confirmed
      title: Rust Workspace Decomposition
      summary: One Cargo workspace with murmur-core (pure deterministic simulation), murmur-shell (backend-neutral controller and ratatui presentation contract), murmur-native (Bevy plus bevy_ratatui terminal binary), and murmur-web (Ratzilla WebAssembly binary).
      rationale:
        - The simulation core must be identical for native, web, tests, and replay, so it carries no engine or terminal dependency.
        - Both delivery targets must share one presentation contract; murmur-shell is that contract, leaving the binaries as thin event and frame bridges.
      references: [project-murmur-runtime, native-console-delivery, web-delivery, ascii-presentation]
    evidence:
      - kind: decision-record
        reference: Cargo.toml
        summary: Workspace members and default-members exclude murmur-web from native builds because it only compiles for wasm32.

  - decision: native-terminal-stack
    core:
      status: accepted
      confidence: confirmed
      title: Native Terminal Stack
      summary: The native executable is a Bevy 0.18 app that renders into a real terminal through bevy_ratatui 0.11 and ratatui 0.30. Bevy 0.18 rather than 0.19 because bevy_ratatui 0.11 pins bevy ^0.18.
      rationale:
        - Chosen by the project owner over a Bevy virtual-console window and over dropping Bevy for plain ratatui.
        - Keeps the spec commitment to a native Bevy executable while playing in an actual terminal.
      assumptions:
        - bevy_ratatui will track future Bevy releases closely enough to upgrade later.
      references: [native-console-delivery]
    evidence:
      - kind: decision-record
        reference: crates/murmur-native/Cargo.toml
        summary: Dependency pins recording the bevy 0.18 / bevy_ratatui 0.11 / ratatui 0.30 combination.

  - decision: web-terminal-stack
    core:
      status: accepted
      confidence: confirmed
      title: Web Terminal Stack
      summary: The web build renders the same murmur-shell through Ratzilla 0.3 (ratatui 0.30 DOM backend) compiled to wasm32, without Bevy. The shared game runtime and presentation contract are murmur-core and murmur-shell, satisfying the web-delivery requirement.
      rationale:
        - Ratzilla shares ratatui 0.30 with the native stack, so every widget is written once.
        - Omitting Bevy from the web binary avoids shipping an unused scheduler in the wasm payload; the Bevy commitment applies to the native executable.
      references: [web-delivery, ascii-presentation]
    evidence:
      - kind: decision-record
        reference: crates/murmur-web/src/main.rs
        summary: Ratzilla event loop bridging browser key events onto the shared shell.

  - decision: embedded-ron-game-data
    core:
      status: accepted
      confidence: confirmed
      title: Embedded RON Game Data
      summary: All gameplay tunables, the disguise permission matrix, item definitions, room templates, population, names, and briefing phrasing are authored RON files under data/ at the repository root, embedded at compile time and parsed with strict unknown-field rejection plus cross-file validation.
      rationale:
        - Embedding guarantees the native and web builds ship byte-identical data, which deterministic replay across targets requires.
        - Strict parsing plus cross-validation makes a data typo fail in tests instead of misbehaving mid-mission.
      references: [access-and-disguise-rules, disguise-permission-matrix, deterministic-mission-replay]
    evidence:
      - kind: decision-record
        reference: crates/murmur-core/src/data.rs
        summary: GameData loader, validation rules, and embedded sources.

  - decision: deterministic-rng-and-integer-math
    core:
      status: accepted
      confidence: confirmed
      title: Deterministic RNG and Integer Math
      summary: The core carries its own PCG32 implementation with named streams (generation, resolution) forked from the mission seed, and all simulation geometry is integer-only. No floating point, platform randomness, or third-party RNG crates participate in simulation results.
      rationale:
        - Replay must reproduce results bit-for-bit on x86_64 and wasm32 across compiler and dependency upgrades; owning the generator removes every external drift source.
        - Separate streams keep command rejection from consuming tie-breaker randomness, which the queue rejection rules require.
      references: [deterministic-mission-replay, action-batch-failure-rules]
    evidence:
      - kind: decision-record
        reference: crates/murmur-core/src/rng.rs
        summary: PCG32 with reference-vector test pinning the exact output sequence.

  - decision: four-way-movement-and-facing
    core:
      status: accepted
      confidence: confirmed
      title: Four-Way Movement and Facing
      summary: Movement and NPC facing are both restricted to the four cardinal directions. Vision cones are an integer ratio test around the facing axis, and the tile behind an actor is exactly one opposite step.
      rationale:
        - The authored facing markers are the four glyphs caret, greater-than, v, and less-than, which fixes facing at four directions.
        - Matching movement to facing keeps garrote's behind-the-target requirement unambiguous and spares simultaneous resolution from diagonal crossing arbitration.
      references: [perception-model, stealth-and-combat-rules, primitive-action-catalog]

  - decision: multi-turn-action-durations
    core:
      status: accepted
      confidence: confirmed
      title: Multi-Turn Action Durations
      summary: Every primitive action has a data-driven duration in turns. Multi-turn actions occupy their actor and apply effects on the final turn; a step while carrying a body takes two turns, which realises the halved movement cadence.
      rationale:
        - The action-batch failure rules already distinguish completed from partially completed actions, implying actions that span turns.
        - Durations in data keep pacing tunable without code changes.
      references: [action-batch-failure-rules, body-and-container-rules, primitive-action-catalog]

  - decision: two-cell-tile-rendering
    core:
      status: deprecated
      confidence: confirmed
      title: Two-Cell Tile Rendering
      summary: Every map tile renders as two terminal cells. NPCs occupy both with glyph plus facing marker exactly as the foundation sketches them, and the doubled width squares up the tile aspect ratio. Superseded after Round One playtest by single-cell-tiles-and-inspection.
      references: [ascii-presentation, perception-model]
    evidence:
      - kind: playtest
        reference: round-one-feedback
        summary: Facing markers read as clutter and doubled the map footprint; the owner asked for a compact map with no direction markers on NPCs.

  - decision: single-cell-tiles-and-inspection
    core:
      status: implemented
      confidence: confirmed
      title: Single-Cell Tiles with Inspection Overlays
      summary: Every map tile renders as one terminal cell with no facing markers on NPCs, halving the map footprint. What an NPC can currently see is surfaced on demand instead; inspecting a visible NPC (mouse hover or the look cursor) highlights every tile their perception covers, computed by the same cone, lighting, and line-of-sight rules the simulation uses. Floor dots are tinted by access zone (public grey, staff blue, VIP magenta, private red, dimmed when remembered rather than seen) so territory reads at a glance.
      supersedes: [two-cell-tile-rendering]
      rationale:
        - Round One playtest direction, permanent glyph markers communicate less than an on-demand vision overlay and cost half the screen.
        - Deriving the overlay from perception rules keeps the display honest; it can never disagree with what NPCs actually see.
      references: [ascii-presentation, perception-model]
    implementation:
      status: declared
      paths: [crates/murmur-shell/src/render.rs, crates/murmur-core/src/perception.rs]
      symbols: [npc_visible_tiles]
    evidence:
      - kind: playtest
        reference: round-one-feedback
        summary: Owner asked for no direction markers, a more compact map, NPC line of sight shown when looking at an NPC, and colourised zone floors.
      - kind: decision-record
        reference: crates/murmur-shell/src/render.rs
        summary: One-cell tile renderer with zone floor tints and the npc_visible_tiles overlay.

  - decision: queue-desurfacing
    core:
      status: implemented
      confidence: confirmed
      title: The Command Queue Is Not Player-Facing
      summary: The command queue remains the architectural mechanism for one-intention-per-turn execution, but it has no player-facing surface. The start screen and HUD no longer mention or display it, Space is repurposed from pause/resume to wait, and there is no manual pause toggle at all, because with no visible queue state an accidental pause would be an invisible stuck state. Escape still cancels pending commands and Backspace still removes the newest; overflow logs a jargon-free line without disturbing queued input. Look mode is the only thing that pauses consumption, internally, and exiting look mode resumes it.
      rationale:
        - Round One playtest direction, the queue is plumbing; players think in actions, not in queue slots.
        - Every keyboard control that silently froze execution has been removed or made self-resuming, eliminating the class of stuck states the playtest exposed.
      references: [queue-control-surface, queue-input-contract, player-command-queue]
    implementation:
      status: declared
      paths: [crates/murmur-shell/src/mission.rs, crates/murmur-shell/src/screens.rs, crates/murmur-shell/src/queue.rs]
      tests: [crates/murmur-shell/src/lib.rs]
    evidence:
      - kind: playtest
        reference: round-one-feedback
        summary: Owner ruled the queue is not a player-facing mechanism and asked for its removal from the start screen and HUD.

  - decision: civilian-displacement
    core:
      status: implemented
      confidence: confirmed
      title: Civilians Step Aside (Displacement Swap)
      summary: Any mover, player or NPC, who steps into a tile occupied by a living civilian or staff member swaps places with them; the bystander ends up on the mover's origin tile. Guards and the player hold their ground and still block. Displacement never applies across a stairs transition, which would teleport the bystander between storeys.
      rationale:
        - Round One playtest direction, bumping into drifting guests read as the game refusing input.
        - Guards remaining solid preserves their role as physical obstacles, and pursuit through crowds no longer stalls on stationary bystanders.
      references: [action-resolver, player-command-translator, npc-controller]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/actions.rs, crates/murmur-core/src/world.rs]
      symbols: [is_displaceable]
      tests: [crates/murmur-core/tests/gameplay.rs]
    evidence:
      - kind: playtest
        reference: round-one-feedback
        summary: Owner asked that moving into a civilian swaps places, for the player and for guards alike.
      - kind: test
        reference: crates/murmur-core/tests/gameplay.rs
        summary: movers_swap_places_with_civilians_but_not_guards.

  - decision: liberal-player-wall-visibility
    core:
      status: implemented
      confidence: confirmed
      title: Liberal Player Wall Visibility
      summary: The player's displayed field of view is widened after line-of-sight computation, every sight-blocking tile adjacent (including diagonals) to a visible open tile is lit. Standing against a wall therefore shows the whole wall face instead of a supercover-sampled patchwork. Presentation only; NPC perception and target visibility are unchanged, and the widening can only add blocking tiles, never actors or floor.
      references: [ascii-presentation, perception-model]
    implementation:
      status: declared
      paths: [crates/murmur-shell/src/mission.rs]
      symbols: [visible_tiles]
    evidence:
      - kind: playtest
        reference: round-one-feedback
        summary: Owner asked that standing against a wall reveals the whole wall.
      - kind: decision-record
        reference: crates/murmur-shell/src/mission.rs
        summary: visible_tiles widening pass in the mission controller.

  - decision: mouse-inspection-and-clickable-actions
    core:
      status: implemented
      confidence: confirmed
      title: Mouse Inspection and Clickable Actions
      summary: Both delivery targets accept mouse input mapped onto the shared shell vocabulary. Hovering a map tile inspects it exactly like the look cursor, without pausing execution; hovering a visible NPC shows their vision overlay. Clicking a sidebar action is identical to pressing its key, clicking an adjacent tile completes a pending directional action, and clicking a candidate confirms shot targeting. Hit-testing resolves against the layout of the last drawn frame, cached by the renderer.
      rationale:
        - Round One playtest direction, the mouse should always be usable to look, and clicking an action should equal pressing the key.
        - Keyboard-only play remains complete; the mouse is an additive convenience on the same command translator.
      references: [ascii-presentation, player-command-translator, look-mode-cursor-contract]
    implementation:
      status: declared
      paths: [crates/murmur-shell/src/mission.rs, crates/murmur-native/src/main.rs, crates/murmur-web/src/main.rs]
      symbols: [UiLayout]
      tests: [crates/murmur-shell/src/lib.rs]
    evidence:
      - kind: playtest
        reference: round-one-feedback
        summary: Owner asked for hover-to-look everywhere and click-equals-key on the action list.
      - kind: test
        reference: crates/murmur-shell/src/lib.rs
        summary: clicking_an_action_matches_pressing_its_key_and_hover_inspects.

  - decision: corridors-are-public-circulation
    core:
      status: accepted
      confidence: confirmed
      title: Corridors Are Public Circulation
      summary: Access zones apply to room interiors. Corridors, stairs, and doorways are public circulation space; legitimacy is evaluated where you stand, so trespass begins at the room boundary.
      rationale:
        - Gating hallways would force zone assignment onto generated circulation space and make upstairs traffic illegal for every guest, contradicting the venue fiction.
      references: [access-and-disguise-rules, room-graph-and-metadata]

  - decision: stairs-auto-transition
    core:
      status: accepted
      confidence: confirmed
      title: Stairs Auto-Transition
      summary: Stairwells occupy the dead-end tiles at both corridor ends; stepping onto a stairs tile carries the mover to the matching tile on the other storey. Move stays the only travel verb.
      references: [primitive-action-catalog, room-graph-and-metadata]

  - decision: bump-open-doors
    core:
      status: accepted
      confidence: confirmed
      title: Bump-Open Doors
      summary: Stepping into a closed door opens it when unlocked or when the mover can pass its lock, consuming the turn; explicit open and close actions remain for stealth control. A locked door without its key rejects the queued move.
      references: [primitive-action-catalog, player-command-translator]

  - decision: npc-implicit-working-keys
    core:
      status: accepted
      confidence: confirmed
      title: NPCs Hold Implicit Working Keys
      summary: NPCs whose legitimate access covers a locked room pass its door as if keyed; only the stealable key items the player can acquire are simulated as inventory. The player always needs the physical key.
      rationale:
        - Staff schedules legitimately cross locked rooms; simulating every working key would add inventory noise without gameplay value.
        - The reachability proof models the player, so key-dependency guarantees are unaffected.
      references: [generated-reachability-proof, inventory-and-access-rules]

  - decision: look-is-controller-inspection
    core:
      status: accepted
      confidence: confirmed
      title: Look Is Controller-Level Inspection
      summary: The catalog's look primitive is realised as the look-mode inspection cursor at the controller layer; it produces no simulation action and consumes no turn, matching the look-mode cursor contract.
      references: [primitive-action-catalog, look-mode-cursor-contract]

  - decision: fleeing-npcs-depart-at-exits
    core:
      status: accepted
      confidence: confirmed
      title: Fleeing NPCs Depart at Exits
      summary: A fleeing NPC who reaches an extraction exit leaves the club for good and stops participating in the simulation. Discovered by playthrough testing, where panicked crowds otherwise cowered on the exit tiles and permanently blocked the player's extraction.
      references: [mission-outcome-rules, alert-propagation-rules]
    evidence:
      - kind: test
        reference: crates/murmur-core/tests/playthrough.rs
        summary: Scripted missions stalled at the turn cap until fleeing civilians vacated the exits.

  - decision: simultaneous-swap-movement
    core:
      status: accepted
      confidence: confirmed
      title: Simultaneous Swap Movement and Two-Tile Corridors
      summary: When simultaneous resolution finds two actors stepping into each other's tiles, both moves apply at once (they squeeze past); unresolvable moves still fail in-turn. The corridor spine is two tiles wide. Both changes remove permanent single-file deadlocks that playthrough testing exposed.
      references: [action-resolver, room-graph-and-metadata]
    evidence:
      - kind: test
        reference: crates/murmur-core/tests/playthrough.rs
        summary: Opposing NPC traffic deadlocked one-tile corridors and walled off the club.

  - decision: action-catalog-extensions
    core:
      status: accepted
      confidence: confirmed
      title: Action Catalog Extensions
      summary: Two additions beyond the authored catalog were required to make accepted rules playable. Pickpocket is a primitive action (stealing from the living, looting the incapacitated), and draw/holster toggles the pistol between pocket and hands so the drawn-visible-illegal state exists.
      rationale:
        - Pickpocket rules and VIP invitation rules are accepted components that presuppose a theft action.
        - The stealth rules distinguish a drawn pistol from a carried one; a state toggle action is the smallest mechanism that expresses it.
      references: [pickpocket-rules, vip-invitation-rules, stealth-and-combat-rules, primitive-action-catalog]

  - decision: campaign-single-slot-autosave
    core:
      status: accepted
      confidence: confirmed
      title: Campaign Persistence Is a Single-Slot Autosave
      summary: One campaign at a time, autosaved between contracts in a small versioned JSON document and restored on relaunch. The native build stores it in the platform data directory and the web build in browser localStorage, both behind one storage trait injected by the delivery binaries. Abandoning a campaign starts fresh; there are no multiple slots.
      rationale:
        - Owner choice at Milestone 2 kickoff, refreshes and restarts must not lose a campaign, and one slot keeps the format and interface small.
        - The campaign derives deterministically from a campaign seed plus recorded player choices, so the save stays compact and auditable.
      references: [milestone-2-campaign-state]

  - decision: campaign-death-ends-arrest-continues
    core:
      status: accepted
      confidence: confirmed
      title: Death Ends the Campaign, Arrest Fines and Continues
      summary: The operative dying ends the campaign at a final tally screen. Arrest fails the contract, levies a cash fine, and confiscates the equipment carried into the mission, but the campaign continues; owned-but-stashed equipment and remaining cash survive. Abandoning a mission fails the contract without confiscation.
      rationale:
        - Owner choice at Milestone 2 kickoff, death carries roguelike finality while arrest feeds the economy and heat loops instead of erasing the run.
      references: [milestone-2-campaign-state, mission-outcome-rules]

  - decision: equipment-buy-once-own-forever
    core:
      status: accepted
      confidence: confirmed
      title: Equipment Is Bought Once and Owned
      summary: Cash buys catalogue equipment between contracts; owned items persist in the stash and any three may be carried per mission. Equipment carried into an arrest is confiscated and must be re-bought. A new campaign starts with the garrote owned plus starting cash, so the first contract is completable while purchases stay meaningful.
      rationale:
        - Owner choice at Milestone 2 kickoff, ownership gives cash a durable purpose and arrests a sting without resetting progression.
      references: [milestone-2-campaign-state]

  - decision: two-corridor-banded-realisation
    core:
      status: removed
      confidence: confirmed
      title: Two-Corridor Banded Graph Realisation (Retired)
      summary: The original realiser carved a fixed circulation topology per storey - a public main corridor through the middle, a staff service corridor along the back, stub passages joining them into a loop, stairs at both dead ends, and rooms sorted west to east by band depth on each shelf. It delivered the gradient, but only ever as one shape - rooms exactly one room deep, packed left to right, with no way to express a building you work your way into. It was retired once every shipped venue had been re-authored as a district tree, and grammar.rs deleted with it. Its guarantees did not lapse - they became invariants asserted over the finished building rather than properties of one realiser, which is what let the replacement be checked at all.
      rationale:
        - Keeping it alive alongside the district engine bought a regression canary for three slices and cost nothing; keeping it past that would have meant maintaining two realisers to serve zero venues.
        - Retiring it in a slice of its own kept the re-baselining of every integration suite separate from the engine work that caused it.
      references: [district-engine-is-one-recursive-rule, corridors-are-public-circulation, nightclub-generator]

  - decision: monotone-capability-closure-planner
    core:
      status: implemented
      confidence: confirmed
      title: Planner Is a Monotone Capability Closure
      summary: The route planner decides reachability by fixpoint closure over (reachable tiles, disguises, keys, invitation) rather than state-space search, which is exact because capabilities are only ever gained. Route classes differ by access model and kill method, social stealth demands legitimacy everywhere and a silent kill, physical stealth allows trespass but keeps locks and silence, violence accepts any weapon. Contract constraints compose as filters (forbidden items, kill-room restriction, allowed exits) over the same closure. Schedule windows are abstract, any room on the target's routine is a potential kill site. Every generated mission must certify all three classes or the attempt is retried. The garrote is treated as an innate silent capability until the equipment slice makes it loadout gear.
      rationale:
        - Monotone closure is deterministic, terminates by construction, and is cheap enough to run on every generation attempt and later at contract-offer time.
        - Filters give the constrained-contract slice a single composition point instead of per-constraint planner variants.
      references: [milestone-2-route-planner, generated-reachability-proof, milestone-2-constrained-contracts]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/planner.rs, crates/murmur-core/src/generator/proof.rs]
      symbols: [prove_route, prove_base_routes, RouteFilters]

  - decision: constraint-catalogue-and-breach-semantics
    core:
      status: implemented
      confidence: confirmed
      title: Constraint Catalogue and Breach Semantics
      summary: Five constraint kinds cover Milestone 2, no firearms (the pistol may not be fired), no civilian casualties (only the target and guards may die by the player's hand), no bodies found (no player-made body may be discovered), private kill (the target must die in personal-tier space), and specific exit (extraction must use a named room). Exactly one rides on each contract. Breaking a constraint never ends the mission, the world records a breach with its reason, the HUD flips to BREACHED, and the contract resolves unclean with no payout. Constraints are incorporated before generation, a private-kill contract guarantees the target's schedule visits personal space, and the planner must certify a compliant route through its filters or the attempt retries.
      rationale:
        - Breach-not-fail keeps missions playable to the end and moves the punishment to the campaign economy where the owner's arrest-continues decision already lives.
        - Every constraint is mechanically checkable from world state alone, no referee judgment, so replay determinism holds.
      references: [milestone-2-constrained-contracts, monotone-capability-closure-planner, mission-outcome-rules]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/contract.rs, crates/murmur-core/src/actions.rs, crates/murmur-core/src/perception.rs, crates/murmur-core/src/planner.rs]
      symbols: [Constraint, prove_constraint]
      tests: [crates/murmur-core/tests/contracts.rs]

  - decision: equipment-catalogue-composition
    core:
      status: implemented
      confidence: confirmed
      title: Equipment Catalogue Composition and Loadout Proofs
      summary: Six purchasable items, two per approach. Physical, lockpicks (a slow pick-lock action that permanently defeats any lock and alarms witnesses via a tampering suspicion gain) and noisemaker charges (thrown at a visible tile to pull guards and staff into investigating). Social, a forged staff pass (staff-tier legitimacy while carried, whatever is worn) and a counterfeit invitation (secure-tier access via the existing invitation rules). Violence, the silenced pistol and the garrote, both now loadout gear rather than default kit, and the garrote command requires carrying one. Equipment only enters a mission through the loadout (at most three items); purchasable items never generate into venues. The planner's three base proofs assume the full catalogue (they describe venue potential), while a separate loadout proof and the constraint proof use the actual carried kit, so a weaponless loadout fails generation until opportunity machines add in-venue kill routes.
      rationale:
        - Two concrete choices per approach satisfies the campaign-state requirement without cosmetic filler, every item changes what routes exist.
        - Splitting venue-potential proofs from actual-loadout proofs keeps the venue guarantee (all three postures supported) independent of what the player happens to own.
      references: [milestone-2-campaign-state, monotone-capability-closure-planner, equipment-buy-once-own-forever]
    implementation:
      status: declared
      paths: [data/equipment.ron, data/items.ron, crates/murmur-core/src/data.rs, crates/murmur-core/src/actions.rs, crates/murmur-core/src/access.rs, crates/murmur-core/src/planner.rs]
      symbols: [EquipmentSpec, Approach]
      tests: [crates/murmur-core/tests/equipment.rs]

  - decision: opportunity-machines-and-deniable-accidents
    core:
      status: implemented
      confidence: confirmed
      title: Opportunity Machines and Deniable Accidents
      summary: The five machines are realised as interactable furniture placed after population and before the proofs, so the reachability closure and planner see their capabilities. Placement follows deterministic improvement rules, the fuse box only where its storey has light to cut, the uniform store only when no wardrobe already offers the disguise, the hoist only above a stop on the target's schedule, the key cache only when locked doors exist, the fire alarm wherever eligible. Accident kills are deniable by design, they carry no player attribution, never breach any contract constraint, and read as noise rather than violence, which makes the rigged hoist the planner's weapon-free kill route and lets weaponless loadouts certify. Interacting counts as visible tampering; the briefing surfaces each placed machine as a discoverable hint.
      rationale:
        - Placing machines before the proofs makes their effects planner-visible facts rather than presentation, exactly as the opportunity-library component demands.
        - Deniable accidents give constraints a systemic pressure valve, the cleanest route under a strict contract is engineering, not shooting.
      references: [milestone-2-opportunity-library, milestone-2-planning-domain-composition, constraint-catalogue-and-breach-semantics]
    implementation:
      status: declared
      paths: [data/opportunities.ron, crates/murmur-core/src/generator/opportunities.rs, crates/murmur-core/src/actions.rs]
      symbols: [place_opportunities]
      tests: [crates/murmur-core/tests/opportunities.rs]

  - decision: observed-crime-heat-model
    core:
      status: implemented
      confidence: confirmed
      title: Heat Counts Observed Crimes, Never Omniscient Ones
      summary: Mission heat rises only when somebody perceives a crime, a heard gunshot, a witnessed act of violence, or the first discovery of a body of the player's making (counted once per body). Accidents and unobserved acts add nothing. Two data-driven tiers shape the venue response, at tier one every guard's suspicion floor rises to wary, at tier two backup guards spawn at the entrance already investigating. Persistent district heat feeds forward at generation as extra guards on shift, capped so a hot district is harder, never locked out; campaign-side persistence and decay land with the campaign state.
      rationale:
        - Observation-gated heat preserves the stealth promise, a perfect ghost run stays quiet no matter what it leaves behind unseen.
        - Tier effects are venue-internal (wariness, door reinforcements), respecting the deferral of external police entry until city-scale traversal exists.
      references: [milestone-2-police-heat, opportunity-machines-and-deniable-accidents]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/perception.rs, crates/murmur-core/src/turn.rs, crates/murmur-core/src/generator/populate.rs]
      symbols: [apply_heat_tiers]
      tests: [crates/murmur-core/tests/heat.rs]

  - decision: deterministic-contract-board
    core:
      status: implemented
      confidence: confirmed
      title: Deterministic Contract Board and District Heat Ledger
      summary: Contract offers derive from the campaign seed and an offer index, two per board, each naming a district, venue, narrative hook, payout (base plus danger money per district heat plus a constraint bonus), exactly one constraint, and a mission seed. Declining or accepting advances the index so boards never repeat. Resolution follows the standing rules, clean completion pays, a breached contract pays nothing, arrest levies the fine and confiscates the carried loadout, death ends the campaign. A hot mission (mission heat at or above the authored threshold) raises its district's persistent heat by two, capped; every other district cools by one as contracts pass elsewhere, so no area ever locks out. All numbers live in data/campaign.ron.
      rationale:
        - Deriving offers from state rather than storing them keeps the save tiny and the board reproducible, matching the deterministic campaign guarantee.
        - Decay-elsewhere is the most literal reading of "persistent heat decays over later contracts" and gives the player agency, lie low in another district.
      references: [milestone-2-campaign-state, milestone-2-police-heat, campaign-death-ends-arrest-continues, equipment-buy-once-own-forever]
    implementation:
      status: declared
      paths: [crates/murmur-campaign/src/lib.rs, data/campaign.ron]
      symbols: [CampaignState, ContractOffer, MissionResolution]
