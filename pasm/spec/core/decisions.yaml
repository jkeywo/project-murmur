      tests: [crates/murmur-shell/src/lib.rs]

  - decision: threat-state-is-named-not-counted
    core:
      status: implemented
      confidence: confirmed
      title: Threat State Is Named, Not Counted
      summary: The sidebar reported a bare count of hunting NPCs, which told the player they were in trouble but not with whom. It now lists who is in sight, nearest first with distance and a plain-language state (unaware, suspicious, investigating, alerted, escorting, attacking, fleeing), capped at four with an overflow line so the action palette is not pushed off the panel. It reuses visible_actors, the same list the shooting UI targets from, so the panel and the map cannot disagree about who is visible. The venue-wide hunting count is kept alongside it, because someone hunting the player may be out of sight. On the map, hostile states are bold as well as coloured. All of this is presentation over the latest completed world state and does not alter what NPCs perceive.
      rationale:
        - Why the player got caught was the second reported comprehension gap; alert state existed in AiState but was only reachable by hovering one NPC at a time.
        - Pairing colour with a modifier and a word keeps the state readable without relying on hue.
      references: [liberal-player-wall-visibility, single-cell-tiles-and-inspection, mouse-inspection-and-clickable-actions]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/world.rs, crates/murmur-shell/src/render.rs]
      symbols: [label, mood_is_hostile]
      tests: [crates/murmur-shell/src/lib.rs]

  - decision: inventory-slots-are-inspectable-not-usable
    core:
      status: implemented
      confidence: confirmed
      title: Inventory Slots Are Inspectable, Not Usable
      summary: The sidebar rendered numbered slots one to six while the digits did nothing in a mission, an affordance that promised an interaction the game did not have. The digits now inspect - they report what the slot holds and, derived from the item spec's capability flags, which palette key carrying it enables. This costs no turn and produces no simulation action, following the precedent look set. Actual item use and drop were considered and rejected for this slice - items are passive enablers by design, so a Use or Drop verb would need a new Command and ActionIntent, a duration entry in tuning, and its own spec work. That is a gameplay feature, not an interface one.
      rationale:
        - A numbered list the player cannot address is worse than no numbers; inspection makes the numbering honest at controller-layer cost.
        - Naming the enabled key rather than writing flavour text means the description follows the keymap table automatically.
      references: [look-is-controller-inspection, keymap-is-one-table, primitive-action-catalog]
    implementation:
      status: declared
      paths: [crates/murmur-shell/src/mission.rs, crates/murmur-shell/src/render.rs]
      symbols: [inspected_slot_text]
