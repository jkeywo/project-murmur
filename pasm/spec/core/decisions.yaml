      tests: [crates/murmur-shell/src/lib.rs]

  - decision: log-entries-carry-severity-and-collapse
    core:
      status: implemented
      confidence: confirmed
      title: Log Entries Carry Severity and Collapse
      summary: The event log was a plain string list rendered with no styling into a fixed eight-row panel, so a detection line looked exactly like ambient chatter and repeated messages scrolled everything else away. Entries are now a LogEntry carrying text, a LogKind of Routine, Notice, or Alarm, and a repeat count; an identical consecutive message bumps the count instead of appending. Perception messages classify as Alarm because the core documents that channel as alarms, screams, and their propagation; shell-side refusals classify as Notice; a contract breach is Alarm, picked out by prefix but guarded by the world's own breach state. Alarms are bold as well as red so severity does not rest on hue alone. Scrollback is deliberately not implemented - the panel is a fixed eight rows and a scroll mode would need its own pause-and-resume handling, while dedup and colour recover most of the value.
      rationale:
        - The reported problem was that the player could not tell what mattered and it scrolled away, which severity and collapsing address directly.
        - Classifying by the core's existing message channels avoids string-matching arbitrary text, and keeps murmur-core untouched.
      references: [ascii-presentation, round-two-playtest-fixes]
    implementation:
      status: declared
      paths: [crates/murmur-shell/src/mission.rs, crates/murmur-shell/src/render.rs]
      symbols: [LogEntry, LogKind, push_log_kind, log_style]
      tests: [crates/murmur-shell/src/lib.rs]

  - decision: threat-state-is-named-not-counted
    core:
      status: implemented
      confidence: confirmed
      title: Threat State Is Named, Not Counted
      summary: The sidebar reported a bare count of hunting NPCs, which told the player they were in trouble but not with whom. It now lists who is in sight, nearest first with distance and a plain-language state (unaware, suspicious, investigating, alerted, escorting, attacking, fleeing), capped at four with an overflow line so the action palette is not pushed off the panel. It reuses visible_actors, the same list the shooting UI targets from, so the panel and the map cannot disagree about who is visible. The venue-wide hunting count is kept alongside it, because someone hunting the player may be out of sight. On the map, hostile states are bold as well as coloured. All of this is presentation over the latest completed world state and does not alter what NPCs perceive.
      rationale:
        - Why the player got caught was the second reported comprehension gap; alert state existed in AiState but was only reachable by hovering one NPC at a time.
        - Pairing colour with a modifier and a word keeps the state readable without relying on hue.
      references: [liberal-player-wall-visibility, single-cell-tiles-and-inspection, mouse-inspection-and-clickable-actions]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/world.rs, crates/murmur-shell/src/render.rs]
      symbols: [label, mood_is_hostile]
      tests: [crates/murmur-shell/src/lib.rs]

  - decision: inventory-slots-are-inspectable-not-usable
    core:
      status: implemented
      confidence: confirmed
      title: Inventory Slots Are Inspectable, Not Usable
      summary: The sidebar rendered numbered slots one to six while the digits did nothing in a mission, an affordance that promised an interaction the game did not have. The digits now inspect - they report what the slot holds and, derived from the item spec's capability flags, which palette key carrying it enables. This costs no turn and produces no simulation action, following the precedent look set. Actual item use and drop were considered and rejected for this slice - items are passive enablers by design, so a Use or Drop verb would need a new Command and ActionIntent, a duration entry in tuning, and its own spec work. That is a gameplay feature, not an interface one.
      rationale:
        - A numbered list the player cannot address is worse than no numbers; inspection makes the numbering honest at controller-layer cost.
        - Naming the enabled key rather than writing flavour text means the description follows the keymap table automatically.
      references: [look-is-controller-inspection, keymap-is-one-table, primitive-action-catalog]
    implementation:
      status: declared
      paths: [crates/murmur-shell/src/mission.rs, crates/murmur-shell/src/render.rs]
      symbols: [inspected_slot_text]
      tests: [crates/murmur-shell/src/lib.rs]

  - decision: no-movement-automation
    core:
      status: accepted
      confidence: confirmed
      title: No Autoexplore, Travel-To, or Rest Automation
      summary: The genre's headline quality-of-life features - autoexplore, travel-to with interrupts, rest-until - were surveyed and deliberately rejected for Murmur. In a stealth game, walking on autopilot is precisely the failure state - the interesting decision is which tile to stand on while someone is looking. Automation would either have to stop on danger, which the foundation forbids the simulation from doing, or walk the player into detection, which is worse than the tedium it removes. Click-to-move already covers deliberate repositioning at one step per click, inside the queue model. The controller-level TravelTo the foundation reserves remains available if a later design wants it, but it is not wanted now.
      rationale:
        - The simulation never tries to infer tactical significance or automatically protect the player from detection; an interrupt policy in the controller would be that protection by another name.
        - The reported problems were comprehension, not tedium, so the effort went to surfacing information instead.
      references: [queue-desurfacing, mouse-parity-across-every-screen, threat-state-is-named-not-counted]

  - decision: text-lives-in-a-csv-catalogue
    core:
      status: implemented
      confidence: confirmed
      title: Text Lives in a CSV Catalogue, Not in Code or RON
      summary: Every player-facing string moved out of Rust literals and out of the RON data files into data/loc/strings.csv, keyed by a stable dot-separated id with a context column describing where the string appears and what fills each {slot}. Code holds ids; the RON files hold structure and numbers and no words at all. Display fields on the specs (item, room, venue, disguise, opportunity names, zone labels, risk and presentation lines) are filled at load by GameData::resolve_text from ids derived from the structural id the spec already carries, so adding a room template means adding one CSV row and nothing else. Ordered pools - person names, districts, briefing reasons - are read from zero-padded id ranges and their RON files were deleted outright. Interpolation is named-slot substitution at runtime, because format! needs a compile-time literal.
      rationale:
        - Localisation needs a single enumerable source; the words were previously spread across four crates and eleven data files with no way to list them.
        - Deriving spec text from the structural id avoids a second id space and keeps every existing spec.name call site working untouched.
        - Zero-padded pool ids matter for determinism - the catalogue is ordered by id, so unpadded numbering would reorder the first nine entries when a tenth appeared and change every existing seed's output.
      references: [embedded-ron-game-data, string-catalogue]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/loc.rs, crates/murmur-core/src/data.rs, data/loc/strings.csv]
      symbols: [Catalogue, with_prefix]
      tests: [crates/murmur-core/src/loc.rs]

  - decision: agent-text-is-bracketed-placeholder
    core:
      status: implemented
      confidence: confirmed
      title: Agent-Written Text Is Bracketed In the Data, Not At Runtime
      summary: Every string an agent wrote - which today is all of them - is wrapped in [square brackets] in the CSV itself rather than decorated at lookup time. What a translator reads in the file is exactly what the game prints, and promoting a line to final prose is the same edit that removes its brackets. No test enforces the marking - the convention is for agents to follow, and the whole point is that a writer removes brackets as they land real copy, so a check would fail on exactly the change it should welcome. The visible consequence is that composed strings nest their brackets, because a template like [{presentation} in {room}] substitutes values that are themselves bracketed.
      rationale:
        - A status column with runtime wrapping was considered; baking the brackets in keeps the file self-describing and means no tooling has to know about a marking convention to render the text correctly.
        - The nesting is loud, which is the point - it disappears exactly as fast as real copy lands.
      references: [text-lives-in-a-csv-catalogue]
    implementation:
      status: declared
      paths: [data/loc/strings.csv]

  - decision: presentation-never-branches-on-text
    core:
      status: implemented
      confidence: confirmed
      title: Presentation Branches on Types, Never on Text
      summary: Moving the words to the catalogue exposed three places where behaviour was keyed off English prose - the mission log picked its alarm styling by testing whether a message started with CONTRACT BREACHED, the debrief chose its panel colour by comparing the headline against three literals, and NPC state reached the inspection line through {:?} on the Mood enum. Each became a typed value - TurnEvents grew a breach field carrying the line separately, the shell gained DebriefHeadline with a tone accessor, and Mood grew a label method backed by the catalogue. RejectReason::PathBlocked likewise stopped carrying a &'static str message and now carries a Blockage variant.
      rationale:
        - Every one of these would have kept compiling and silently misbehaved under translation, which is the failure mode a localisation pass most needs to rule out.
        - Deriving player-facing words from Rust variant names put the identifier namespace on screen where no translator could reach it.
      references: [text-lives-in-a-csv-catalogue, ascii-presentation]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/actions.rs, crates/murmur-core/src/world.rs, crates/murmur-shell/src/lib.rs, crates/murmur-shell/src/mission.rs]
      symbols: [Blockage, DebriefHeadline, Tone]
      tests: [crates/murmur-shell/src/lib.rs]
