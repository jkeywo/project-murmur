  - decision: contract-conditions-name-their-rooms
    core:
      status: implemented
      confidence: confirmed
      title: Contract Conditions Name Their Rooms
      summary: Playtest found the private-kill rule (kill must land in a personal-tier office) confusing because its text said only "in private, away from the crowd", which reads as any quiet spot. The mechanic was kept; the wording was fixed to match it. Constraint::describe and short take the game data and venue and name the actual rooms - private-kill lists the venue's real offices, specific-exit uses the room's authored display name rather than its raw template id. Breach lines name where it went wrong ("the target died in the dance floor - the kill had to happen in the manager's office or security office"; "you left by the wrong exit - the contract named the loading bay"). The debrief spells out the breach reason, carried on MissionResolution and ResolutionSummary. The hub board keeps a compact chip while the briefing wraps to show the full condition.
      rationale:
        - When a rule is fine but its description misleads, correct the words, not the mechanic; naming concrete rooms removes the guesswork that caused the bad kill.
      references: [constraint-catalogue-and-breach-semantics, round-two-playtest-fixes, mission-briefing]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/contract.rs, crates/murmur-core/src/actions.rs, crates/murmur-campaign/src/lib.rs, crates/murmur-shell/src/screens.rs, crates/murmur-shell/src/render.rs]
      symbols: [describe, short]
      tests: [crates/murmur-core/tests/contracts.rs]

  - decision: mouse-parity-across-every-screen
    core:
      status: implemented
      confidence: confirmed
      title: Mouse Parity Across Every Screen
      summary: The mouse drives the whole game, not just the mission palette. Interface screens record a ScreenLayout of clickable rows carrying a ShellInput rather than a bare key, so Enter and Esc prompts are clickable alongside keyed rows; the shell resolves a click to its row's input before dispatching, and the screens' own handlers stay keyboard-shaped. Prompts render in a fixed footer reserved at the bottom of each panel, so they are always visible and sit at known rows however long the body runs, and long panels word-wrap at build time (not render time) to keep those row positions exact. In the mission, clicking any tile already seen queues one step along the shortest path towards it, using the same pathfinder the NPCs use; clicking again walks the next step, preserving one intention per turn.
      rationale:
        - Playtest asked for click-to-act everywhere including the contract screens; carrying an input rather than a key in the layout makes every prompt reachable without special cases per screen.
        - One step per click keeps movement inside the queue model rather than introducing multi-turn autopilot the player cannot interrupt.
      references: [mouse-inspection-and-clickable-actions, ascii-presentation, queue-input-contract]
    implementation:
      status: declared
      paths: [crates/murmur-shell/src/lib.rs, crates/murmur-shell/src/screens.rs, crates/murmur-shell/src/mission.rs]
      symbols: [ScreenLayout, body_and_footer, render_footer]
      tests: [crates/murmur-shell/src/lib.rs]

  - decision: keymap-is-one-table
    core:
      status: implemented
      confidence: confirmed
      title: Key Bindings Live in One Table
      summary: The fifteen mission key literals were written out in four places that could drift apart - the clickable palette in render, the dispatch match in mission, the availability probe action_block, and the start screen's key list. They now come from one table, murmur-shell keymap, whose entries carry the key, a short palette label, a one-line description, and a category. The palette, the start screen, the in-mission help overlay, and the inventory-slot inspection line all render from it. Availability deliberately stays out of the table and remains in action_block, because it depends on live world state; the two are keyed by the same char. A test presses every table key from a clean normal-mode state and asserts something observable happened, which is what actually holds the table and the dispatch match together.
      rationale:
        - Four hand-maintained copies of the same list is a drift bug waiting to happen, and the start screen's copy had no test at all.
        - Describing an item by the key it enables rather than by flavour text falls out of the table for free, and follows any future rebinding.
      references: [round-two-playtest-fixes, mouse-inspection-and-clickable-actions, ascii-presentation]
    implementation:
      status: declared
      paths: [crates/murmur-shell/src/keymap.rs, crates/murmur-shell/src/render.rs, crates/murmur-shell/src/screens.rs, crates/murmur-shell/src/mission.rs]
      symbols: [ActionKey, Category, ACTIONS, CONTROLS]
      tests: [crates/murmur-shell/src/lib.rs, crates/murmur-shell/src/keymap.rs]

  - decision: overlay-modes-are-self-resuming
    core:
      status: accepted
      confidence: confirmed
      title: Overlay Input Modes Must Resume on Exit
      summary: InputMode gains Help (the key list, opened with the question-mark key) and Confirm (a yes/no guard on something irreversible). Both pause queue consumption while they are up and resume it on every exit path, extending the contract look mode already followed. Help closes on any key or click; Confirm treats y and Enter as yes and anything else, including a map click, as no. Each has a regression test asserting the queue is not left paused, mirroring the look-mode test.
      rationale:
        - The queue has no visible state, so a pause the player cannot see and cannot leave is indistinguishable from a hang - the same reasoning that ruled out a manual pause toggle.
        - Any future overlay mode inherits this requirement.
      references: [queue-desurfacing, look-is-controller-inspection, queue-input-contract]
    implementation:
      status: declared
      paths: [crates/murmur-shell/src/mission.rs, crates/murmur-shell/src/render.rs]
      symbols: [InputMode, ConfirmAction]
      tests: [crates/murmur-shell/src/lib.rs]

  - decision: irreversible-choices-ask-first
    core:
      status: implemented
      confidence: confirmed
      title: Irreversible Choices Ask First
      summary: Two single keys used to destroy unrecoverable state with no confirmation. Q ended a mission outright, and n on the start screen wiped the only campaign save. Both now ask. Q opens an in-mission Confirm prompt; the mission owns the question and the shell carries out the answer through take_confirmed, keeping the consequence where the campaign lives. Starting over routes through a ConfirmNewCampaign screen, but only when a save actually exists - with nothing to lose the prompt would be noise.
      rationale:
        - Under permadeath and a single autosave slot there is no undo, so a mistyped key should not be able to end a run or a campaign.
        - Prompting only when there is something to protect keeps the guard from becoming a reflex the player clicks through.
      references: [campaign-single-slot-autosave, campaign-death-ends-arrest-continues, overlay-modes-are-self-resuming]
    implementation:
      status: declared
      paths: [crates/murmur-shell/src/lib.rs, crates/murmur-shell/src/mission.rs, crates/murmur-shell/src/screens.rs]
