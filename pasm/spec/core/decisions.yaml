  - decision: overlay-modes-are-self-resuming
    core:
      status: accepted
      confidence: confirmed
      title: Overlay Input Modes Must Resume on Exit
      summary: InputMode gains Help (the key list, opened with the question-mark key) and Confirm (a yes/no guard on something irreversible). Both pause queue consumption while they are up and resume it on every exit path, extending the contract look mode already followed. Help closes on any key or click; Confirm treats y and Enter as yes and anything else, including a map click, as no. Each has a regression test asserting the queue is not left paused, mirroring the look-mode test.
      rationale:
        - The queue has no visible state, so a pause the player cannot see and cannot leave is indistinguishable from a hang - the same reasoning that ruled out a manual pause toggle.
