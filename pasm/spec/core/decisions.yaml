  - decision: irreversible-choices-ask-first
    core:
      status: implemented
      confidence: confirmed
      title: Irreversible Choices Ask First
      summary: Two single keys used to destroy unrecoverable state with no confirmation. Q ended a mission outright, and n on the start screen wiped the only campaign save. Both now ask. Q opens an in-mission Confirm prompt; the mission owns the question and the shell carries out the answer through take_confirmed, keeping the consequence where the campaign lives. Starting over routes through a ConfirmNewCampaign screen, but only when a save actually exists - with nothing to lose the prompt would be noise.
      rationale:
        - Under permadeath and a single autosave slot there is no undo, so a mistyped key should not be able to end a run or a campaign.
        - Prompting only when there is something to protect keeps the guard from becoming a reflex the player clicks through.
