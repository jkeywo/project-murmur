  - decision: no-movement-automation
    core:
      status: accepted
      confidence: confirmed
      title: No Autoexplore, Travel-To, or Rest Automation
      summary: The genre's headline quality-of-life features - autoexplore, travel-to with interrupts, rest-until - were surveyed and deliberately rejected for Murmur. In a stealth game, walking on autopilot is precisely the failure state - the interesting decision is which tile to stand on while someone is looking. Automation would either have to stop on danger, which the foundation forbids the simulation from doing, or walk the player into detection, which is worse than the tedium it removes. Click-to-move already covers deliberate repositioning at one step per click, inside the queue model. The controller-level TravelTo the foundation reserves remains available if a later design wants it, but it is not wanted now.
      rationale:
        - The simulation never tries to infer tactical significance or automatically protect the player from detection; an interrupt policy in the controller would be that protection by another name.
        - The reported problems were comprehension, not tedium, so the effort went to surfacing information instead.
      references: [queue-desurfacing, mouse-parity-across-every-screen, threat-state-is-named-not-counted]

  - decision: text-lives-in-a-csv-catalogue
    core:
      status: implemented
      confidence: confirmed
      title: Text Lives in a CSV Catalogue, Not in Code or RON
      summary: Every player-facing string moved out of Rust literals and out of the RON data files into data/loc/strings.csv, keyed by a stable dot-separated id with a context column describing where the string appears and what fills each {slot}. Code holds ids; the RON files hold structure and numbers and no words at all. Display fields on the specs (item, room, venue, disguise, opportunity names, zone labels, risk and presentation lines) are filled at load by GameData::resolve_text from ids derived from the structural id the spec already carries, so adding a room template means adding one CSV row and nothing else. Ordered pools - person names, districts, briefing reasons - are read from zero-padded id ranges and their RON files were deleted outright. Interpolation is named-slot substitution at runtime, because format! needs a compile-time literal.
      rationale:
        - Localisation needs a single enumerable source; the words were previously spread across four crates and eleven data files with no way to list them.
        - Deriving spec text from the structural id avoids a second id space and keeps every existing spec.name call site working untouched.
        - Zero-padded pool ids matter for determinism - the catalogue is ordered by id, so unpadded numbering would reorder the first nine entries when a tenth appeared and change every existing seed's output.
      references: [embedded-ron-game-data, string-catalogue]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/loc.rs, crates/murmur-core/src/data.rs, data/loc/strings.csv]
      symbols: [Catalogue, with_prefix]
      tests: [crates/murmur-core/src/loc.rs]

  - decision: agent-text-is-bracketed-placeholder
    core:
      status: implemented
      confidence: confirmed
      title: Agent-Written Text Is Bracketed In the Data, Not At Runtime
      summary: Every string an agent wrote - which today is all of them - is wrapped in [square brackets] in the CSV itself rather than decorated at lookup time. What a translator reads in the file is exactly what the game prints, and promoting a line to final prose is the same edit that removes its brackets. No test enforces the marking - the convention is for agents to follow, and the whole point is that a writer removes brackets as they land real copy, so a check would fail on exactly the change it should welcome. The visible consequence is that composed strings nest their brackets, because a template like [{presentation} in {room}] substitutes values that are themselves bracketed.
      rationale:
        - A status column with runtime wrapping was considered; baking the brackets in keeps the file self-describing and means no tooling has to know about a marking convention to render the text correctly.
        - The nesting is loud, which is the point - it disappears exactly as fast as real copy lands.
      references: [text-lives-in-a-csv-catalogue]
    implementation:
      status: declared
      paths: [data/loc/strings.csv]

  - decision: presentation-never-branches-on-text
    core:
      status: implemented
      confidence: confirmed
      title: Presentation Branches on Types, Never on Text
      summary: Moving the words to the catalogue exposed three places where behaviour was keyed off English prose - the mission log picked its alarm styling by testing whether a message started with CONTRACT BREACHED, the debrief chose its panel colour by comparing the headline against three literals, and NPC state reached the inspection line through {:?} on the Mood enum. Each became a typed value - TurnEvents grew a breach field carrying the line separately, the shell gained DebriefHeadline with a tone accessor, and Mood grew a label method backed by the catalogue. RejectReason::PathBlocked likewise stopped carrying a &'static str message and now carries a Blockage variant.
      rationale:
        - Every one of these would have kept compiling and silently misbehaved under translation, which is the failure mode a localisation pass most needs to rule out.
        - Deriving player-facing words from Rust variant names put the identifier namespace on screen where no translator could reach it.
      references: [text-lives-in-a-csv-catalogue, ascii-presentation]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/actions.rs, crates/murmur-core/src/world.rs, crates/murmur-shell/src/lib.rs, crates/murmur-shell/src/mission.rs]
      symbols: [Blockage, DebriefHeadline, Tone]
      tests: [crates/murmur-shell/src/lib.rs]

  - decision: district-engine-is-one-recursive-rule
    core:
      status: implemented
      confidence: confirmed
      title: One Recursive District Rule Expresses Every Venue Topology
      summary: A district is a rectangle on one storey owning a two-tile corridor - its spine - along its top edge, and everything it contains hangs below that spine as a cell reached through a single doorway - either a leaf room or a nested child district. That one rule is the entire engine. The three Hitman topologies come out of the authored tree's shape alone - a chain is an onion, a star is a festival, and siblings that are themselves chains are an archipelago - so there is no match on form anywhere in the carving code. A district marked own-storey is laid out on its own floor and reached by a stairwell from its parent's spine, which is how a venue gains height without giving up the gradient. The engine is read off the venue's `districts` field. It shipped alongside the original banded realiser for three slices, so the two existing venues acted as a regression canary; once both had been re-authored as district trees the old realiser was deleted and the form indirection with it.
      rationale:
        - Authoring three topologies as three code paths would have made the engine a collection of special cases, and the acceptance test for generality is precisely that onion and archipelago can then be added as data with no engine change.
        - Building alongside the banded realiser keeps seed-stable layout for every existing replay and contract test, so a bug in the new engine cannot present as a regression in the old venues.
        - The corridor width of two is not tunable - a non-displaceable guard standing in a one-wide corridor is a permanent wall, which is the same anti-deadlock reasoning the banded realiser already documents.
      references: [two-corridor-banded-realisation]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/generator/district.rs, crates/murmur-core/src/generator/layout.rs, crates/murmur-core/src/data.rs, data/venues.ron]
      symbols: [DistrictPattern, build_layout]
      tests: [crates/murmur-core/src/generator/district.rs, crates/murmur-core/src/generator/mod.rs]

  - decision: gradient-is-checked-as-tree-and-as-geometry
    core:
      status: implemented
      confidence: confirmed
      title: The Security Gradient Is Checked Twice - Once As A Tree, Once As A Building
      summary: Zone gained a depth ordering in which Public is outermost, Secure and Staff are siblings one step off the street, and Personal is innermost. The district engine refuses at expansion time any recipe that nests a shallower tier inside a deeper one, while the tree still exists and before any geometry has been carved. Separately a form-agnostic test asserts the finished building honours the same ordering - the cheapest way into a deeper tier, counted in doors crossed from the player's start, is never shorter than the cheapest way into a shallower one - and it runs over every venue in the catalogue rather than a hardcoded list, so a newly authored venue is covered the moment it exists.
      rationale:
        - A recipe error caught as a tree names the offending pair of districts; the same error caught after carving presents as a confusing map, so the cheap check earns its place even though the geometric one subsumes it.
        - Asserting the gradient over the built world rather than the recipe keeps the invariant true of any realiser, which is what lets the banded and district engines coexist under one guarantee.
    implementation:
      status: declared
      paths: [crates/murmur-core/src/data.rs, crates/murmur-core/src/generator/district.rs, crates/murmur-core/src/generator/mod.rs]
      symbols: [depth, expand]
      tests: [crates/murmur-core/src/generator/mod.rs, crates/murmur-core/src/generator/district.rs]

  - decision: protection-not-reachability-is-the-difficulty
    core:
      status: implemented
      confidence: confirmed
      title: Difficulty Lives In Protection, Not In Reachability
      summary: The target's day is a cycle of beats, each labelled escorted or alone. The route planner reads two different position sets depending on the method - a weapon kill must land on an alone beat, an accident may land anywhere the schedule goes - and that two-line asymmetry is the whole mechanical shape of the milestone. Reaching the target was never the hard part and the planner already guaranteed it; being there when the target is alone is. Generation carries a hard obligation that at least one alone beat exists somewhere the player can eventually stand, because reachability proofs say nothing about protection and would otherwise certify a mission that cannot be finished with a weapon.
      rationale:
        - The obvious alternative - making the target tougher or the guards sharper - scales frustration rather than difficulty, and leaves the player without a plan to form.
        - Accidents staying valid against an escorted target is what makes them the answer to a target you cannot get near, rather than a strictly worse weapon.
        - The spawn position is deliberately excluded from the vulnerable set. The target spawns standing on beat zero, which is escorted like any other public beat; including it silently readmitted guarded kill sites and made the guarding test pass against an unfixed planner.
      references: [monotone-capability-closure-planner, district-engine-is-one-recursive-rule]
    implementation:
      status: declared
      paths: [crates/murmur-core/src/world.rs, crates/murmur-core/src/generator/schedule.rs, crates/murmur-core/src/generator/proof.rs, crates/murmur-core/src/planner.rs, data/population.ron]
      symbols: [Beat, Schedule, Protection, BeatTrigger, build_schedule]
      tests: [crates/murmur-core/src/generator/mod.rs, crates/murmur-core/src/generator/schedule.rs]

  - decision: beats-mirror-the-routine-index-for-index
    core:
      status: implemented
      confidence: confirmed
      title: Beats Mirror The Routine, Index For Index
      summary: A schedule's beats are index-aligned with the actor's routine - same length, same positions, same dwells - and generation refuses a target whose two representations disagree. Everything written before beats existed (pathfinding, briefing facts, reachability proofs, replay) keeps reading the routine untouched, while systems that care about protection read the beat at the same index. The alternative, a flag day where every reader moved to beats at once, would have put the schedule work and a rewrite of four subsystems in the same commit.
      rationale:
        - Duplicated state is a real cost, so it is paid down by an explicit alignment check at generation rather than by hoping the two stay in step.
        - Keeping the AI driving off the routine in this slice means the target's observable behaviour is unchanged, which is what makes the beat labelling reviewable on its own.
      references: [protection-not-reachability-is-the-difficulty]
    implementation:
