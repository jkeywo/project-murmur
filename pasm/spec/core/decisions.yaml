  - decision: warehouse-second-venue
    core:
      status: implemented
      confidence: confirmed
      title: The Bonded Warehouse Is the Second Venue
      summary: A warehouse rather than an office, chosen for maximum mechanical contrast with the nightclub, sparse civilians (a handful of visiting hauliers via a per-venue role-count override), more guards, a dim staff-tier storage floor thick with containers, a secure cage flavoured for visitor passes, and a personal-tier foreman's office behind its own key. It is authored entirely as data, seven new room templates, one key item, one venues.ron entry with flavoured zone labels; the only code addition is the per-venue role-count override, shared by any future venue. Cross-venue tests hold the warehouse to the identical certification bar, all three route classes, every constraint kind, opportunity machines, and the loadout proof.
      rationale:
        - The nightclub already exercises social stealth in crowds; the warehouse stresses physical stealth in emptiness, proving the systems rather than repeating them.
        - Zero venue-specific code is the point of milestone-2-second-venue, the architecture is venue-driven when a venue is one data file away.
      references: [milestone-2-second-venue, two-corridor-banded-realisation, milestone-2-venue-graph-grammar]
    implementation:
      status: declared
