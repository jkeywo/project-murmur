  - decision: ron-family-is-the-planning-domain-format
    core:
      status: implemented
      confidence: confirmed
      title: The RON Data Family Is the Planning-Domain Composition Format
      summary: Milestone 2's planning-domain composition is realised as the composing RON family rather than a single monolithic domain file. The assassination-contract domain is the constraint catalogue plus campaign contract data, the venue domain is a venues.ron entry with its room templates, and the generic-opportunity domain is opportunities.ron. They meet in the generator, which composes them into the nodes, actions, constraints, and effects the planner searches. The shared vocabulary a future mission-scripting layer will reuse is the OpportunityEffect enum plus the constraint and filter types, hand-crafted scripted elements can emit the same effects the generated machines do.
      rationale:
        - Composing small per-concern files keeps each domain independently authorable and validated, while the effect vocabulary is the actual compatibility surface a scripting layer needs.
        - Milestone 2 loads exactly the required three domains, one contract kind, one venue per contract, one opportunity library.
      references: [milestone-2-planning-domain-composition, opportunity-machines-and-deniable-accidents, constraint-catalogue-and-breach-semantics]
    implementation:
      status: declared
      paths: [data/venues.ron, data/opportunities.ron, data/campaign.ron, crates/murmur-core/src/data.rs]
      symbols: [OpportunityEffect]

  - decision: round-two-playtest-fixes
    core:
      status: implemented
      confidence: confirmed
      title: Round Two Playtest Fixes
      summary: Five playtest corrections. A living target that flees the venue through an exit ends the mission as MissionOutcome::TargetEscaped (campaign ContractResult::TargetEscaped, no payout, no fine, campaign continues) rather than leaving the contract impossible to complete. The drop-body prompt carries the same "b again drops here" hint as carry. Targeted palette actions with no valid potential target (no garrote victim adjacent, no lock to pick, no body to carry, and so on) are dimmed and, when pressed or clicked, report why instead of entering a dead targeting mode; availability is computed from the player's own tile plus its four orthogonal neighbours and inventory, mirroring the command translator's adjacency. The drawn-weapon HUD line reads the weapon by its exact Hands::Drawn item id, fixing a "pistol drawn (0 rounds)" misread now that the garrote is also a weapon. Service-connection doors are carved as a proper walled passage down to the room's north wall, closing the door-to-nowhere gap that appeared when a service-shelf room did not reach the service corridor.
      rationale:
        - Each is a correctness or clarity fix surfaced by play; none change the design, and each is guarded by a test (a door-connectivity invariant across both venues, a target-escape scenario, a campaign resolution case, and a shell availability test).
      references: [mission-outcome-rules, two-corridor-banded-realisation, ascii-presentation, campaign-death-ends-arrest-continues]
